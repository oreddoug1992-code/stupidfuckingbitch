name: Local Android APK Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK locally
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: artifacts/obd2-pro

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Prebuild Android
        run: CI=1 pnpm exec expo prebuild --platform android --clean --no-install

      - name: Build Debug APK
        run: |
          cd android
          chmod +x ./gradlew
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          ./gradlew :app:assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: obd2-pro-debug-apk
          path: artifacts/obd2-pro/android/app/build/outputs/apk/debug/*.apk
          retention-days: 7
