name: EAS Android Production Build

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/eas-build.yml'
      - 'artifacts/obd2-pro/**'
      - 'app.json'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android production with EAS
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EAS_BUILD_NO_EXPO_GO_WARNING: "true"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Setup EAS CLI
        run: npm install -g eas-cli@latest

      - name: Validate EAS secret and project ID
        working-directory: artifacts/obd2-pro
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "::error::EXPO_TOKEN secret is not set. Add it at Settings > Secrets and variables > Actions."
            exit 1
          fi

          echo "Logged in to Expo as:"
          eas whoami

          PROJECT_ID=$(python3 - <<'PY'
          import json
          with open('app.json', encoding='utf-8') as f:
              data = json.load(f)
          print(data.get('expo', {}).get('extra', {}).get('eas', {}).get('projectId', ''))
          PY
          )
          UUID_PATTERN='^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$'
          if ! echo "$PROJECT_ID" | grep -qiE "$UUID_PATTERN"; then
            echo "::error::expo.extra.eas.projectId in artifacts/obd2-pro/app.json is not a valid UUID: '$PROJECT_ID'"
            exit 1
          fi

          ROOT_PROJECT_ID=$(python3 - <<'PY'
          import json
          with open('../../app.json', encoding='utf-8') as f:
              data = json.load(f)
          print(data.get('expo', {}).get('extra', {}).get('eas', {}).get('projectId', ''))
          PY
          )
          if [ "$ROOT_PROJECT_ID" != "$PROJECT_ID" ]; then
            echo "::warning::Root app.json projectId ($ROOT_PROJECT_ID) does not match artifacts/obd2-pro/app.json projectId ($PROJECT_ID). The workflow builds artifacts/obd2-pro."
          fi

          echo "EAS project ID: $PROJECT_ID"

      - name: Build Android production via EAS
        id: eas_build
        working-directory: artifacts/obd2-pro
        run: |
          set +e
          BUILD_JSON=$(eas build \
            --platform android \
            --profile production \
            --non-interactive \
            --wait \
            --json 2>eas-build-error.log)
          STATUS=$?
          set -e

          if [ $STATUS -ne 0 ]; then
            echo "EAS build failed. Error log:"
            cat eas-build-error.log
            if grep -q "Entity not authorized" eas-build-error.log; then
              echo "::error::Expo token is valid but cannot access this app. Replace GitHub secret EXPO_TOKEN with a token from the Expo account or organization that owns the EAS project ID in artifacts/obd2-pro/app.json."
            fi
            exit $STATUS
          fi

          echo "EAS build output:"
          echo "$BUILD_JSON"

          ARTIFACT_URL=$(echo "$BUILD_JSON" | python3 - <<'PY'
          import json, sys
          raw = sys.stdin.read().strip()
          data = json.loads(raw)
          builds = data if isinstance(data, list) else [data]
          build = builds[0]
          artifacts = build.get('artifacts') or {}
          url = artifacts.get('buildUrl') or artifacts.get('applicationArchiveUrl') or build.get('artifactsUrl') or ''
          print(url)
          PY
          )

          if [ -z "$ARTIFACT_URL" ]; then
            echo "::error::Could not extract Android artifact URL from EAS build output."
            exit 1
          fi

          echo "Android artifact URL: $ARTIFACT_URL"
          echo "artifact_url=$ARTIFACT_URL" >> "$GITHUB_OUTPUT"
