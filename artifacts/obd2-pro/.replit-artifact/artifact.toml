kind = "mobile"
previewPath = "/"
title = "OBD2 Pro"
version = "1.0.0"
id = "artifacts/obd2-pro"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 20645

[services.development]
run = "pnpm --filter @workspace/obd2-pro run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/obd2-pro", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/obd2-pro", "run", "serve" ]

[services.env]
PORT = "20645"
BASE_PATH = "/"
